<!DOCTYPE html>
<html lang="en" class="page">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bose</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com"
      crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/styles/main.scss">
  </head>

  <body class="page__body">
    <main class="contact">
      <div class="container">
        <h1 class="contact_title">Contact Us</h1>
        <div class="contact__form">
          <form action="#" class="contact__form form">
            <input
            type="text"
            class="form__input"
            placeholder="Name"
            >
            <input
            type="text"
            class="form__input"
            placeholder="Email"
            >
            <textarea class="form__input form__input--textarea" placeholder="Messаge"></textarea>
            <button type="submit" class="form--button">Send</button>
          </form>
          <div class="contact__info">
            <div class="contact__item">
              <p class="contact__label">Phone</p>
              <a href="tel:+12345555555" class="contact__link">+1 234 5555-55-55</a>
            </div>
            <div class="contact__item">
              <p class="contact__label">Email</p>
              <a href="hello@nothing.com" class="contact__link">hello@nothing.com</a>
            </div>
            <div class="contact__item">
              <p class="contact__label">Address</p>
              <address class="contact__address">
                400 first ave.<br>
                suite 700<br>
                Minneapolis, MN 55401
              </address>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
